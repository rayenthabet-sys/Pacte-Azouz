# Nixpacks configuration — makes Railway install both Python and Node
[phases.setup]
nixPkgs = ["python311", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
